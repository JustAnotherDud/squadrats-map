<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Squadrats — Análise</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
<style>
  html, body { margin:0; padding:0; height:100%; font-family: -apple-system, Segoe UI, Roboto, sans-serif; background:#0f1115; color:#e7e9ee; overflow:hidden; }
  #map { position:absolute; inset:0; }

  #topbar { position:absolute; top:0; left:0; right:0; z-index:1000; padding:8px 10px; display:flex; flex-direction:column; gap:6px; pointer-events:none; }
  #topbar h1 { font-size:14px; margin:0; font-weight:600; text-shadow:0 1px 3px rgba(0,0,0,.8); pointer-events:none; }
  .seg { display:flex; gap:4px; pointer-events:auto; }
  .seg button { flex:1; background:rgba(21,24,33,.92); color:#e7e9ee; border:1px solid #2c3242; border-radius:7px; padding:6px 8px; font-size:11.5px; cursor:pointer; backdrop-filter: blur(4px); }
  .seg button.active { background:#3d7bf5; border-color:#3d7bf5; }

  #sheet { position:absolute; left:0; right:0; bottom:0; z-index:1000; background:#151821; border-top:1px solid #262b38; border-radius:14px 14px 0 0; box-shadow:0 -4px 20px rgba(0,0,0,.4); transition: height .25s ease; }
  #sheet.collapsed { height:54px; }
  #sheet.expanded { height:62vh; }
  #sheet.detail { height:250px; }
  #sheet-list { display:block; }
  #sheet-detail { display:none; }
  #sheet.detail #sheet-list { display:none; }
  #sheet.detail #sheet-detail { display:block; }
  #sheet-handle { padding:9px 14px 4px; cursor:grab; touch-action:none; }
  #sheet-handle .bar { width:36px; height:4px; background:#3a4256; border-radius:2px; margin:0 auto 8px; }
  #sheet-summary { display:flex; justify-content:space-between; align-items:center; padding:0 14px 10px; font-size:13px; }
  #sheet-summary b { color:#fff; }
  #sheet-body { padding:0 14px 16px; overflow-y:auto; display:none; }
  #sheet.expanded #sheet-body, #sheet.detail #sheet-body { display:block; height:calc(100% - 54px); }

  table.stats-table { width:100%; border-collapse:collapse; font-size:12px; }
  table.stats-table th { position:sticky; top:0; background:#151821; text-align:right; font-size:10px; text-transform:uppercase; letter-spacing:.03em; color:#7d8598; padding:5px 4px; cursor:pointer; user-select:none; white-space:nowrap; }
  table.stats-table th.col-name { text-align:left; }
  table.stats-table th .arrow { opacity:.5; margin-left:2px; }
  table.stats-table th.sorted .arrow { opacity:1; color:#3d7bf5; }
  table.stats-table td { padding:5px 4px; text-align:right; border-bottom:1px solid #1e2230; white-space:nowrap; }
  table.stats-table td.col-name { text-align:left; overflow:hidden; text-overflow:ellipsis; max-width:0; width:100%; }
  table.stats-table tr.selectable { cursor:pointer; }
  table.stats-table tr.selectable:active td { background:#1c2130; }
  table.stats-table tr.selected td { background:#1a2420; }
  table.stats-table tr.selected td.col-name { font-weight:700; color:#fff; box-shadow: inset 3px 0 0 #39d97a; }
  @media (max-width:420px) {
    table.stats-table td.col-total, table.stats-table th.col-total,
    table.stats-table td.col-remaining, table.stats-table th.col-remaining { display:none; }
  }
  .stat-row { display:flex; justify-content:space-between; align-items:center; padding:5px 0; border-bottom:1px solid #1e2230; font-size:12.5px; gap:8px; }
  .stat-row b { color:#fff; white-space:nowrap; }
  .stat-name { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .legend-dot { display:inline-block; width:9px; height:9px; border-radius:2px; margin-right:6px; vertical-align:middle; flex-shrink:0; }
  .section-title { margin-top:12px; font-size:11px; text-transform:uppercase; letter-spacing:.05em; color:#7d8598; }
  .note { font-size:10px; color:#6b7285; padding:8px 0 0; }
  .zero-toggle { font-size:11.5px; color:#7ab8ff; padding:7px 4px; cursor:pointer; user-select:none; }
  .zero-toggle:active { opacity:.7; }
  #btn-color-mode { align-self:flex-start; margin-top:2px; pointer-events:auto; background:rgba(21,24,33,.92); color:#e7e9ee; border:1px solid #2c3242; border-radius:7px; padding:6px 10px; font-size:11.5px; cursor:pointer; backdrop-filter: blur(4px); }
  #btn-color-mode.active { background:#3d7bf5; border-color:#3d7bf5; }

  #sheet-detail { padding:2px 0 0; }
  #sheet-detail .detail-back { background:none; border:none; color:#7ab8ff; font-size:12px; padding:0 0 10px; cursor:pointer; }
  #sheet-detail h2 { margin:0 0 8px; font-size:16px; }
  .detail-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px 16px; }
  .detail-item { }
  .detail-item .label { font-size:10px; text-transform:uppercase; letter-spacing:.03em; color:#7d8598; }
  .detail-item .value { font-size:16px; font-weight:700; color:#fff; }

  a { color:#7ab8ff; }
  #loading { position:absolute; inset:0; z-index:2000; background:#0f1115; display:flex; align-items:center; justify-content:center; font-size:13px; color:#9aa2b1; }
</style>
</head>
<body>
<div id="loading">a carregar…</div>
<div id="map"></div>

<div id="topbar">
  <h1>Squadrats — Análise</h1>
  <div class="seg" id="seg-grelha">
    <button data-val="squadrats">Squadrats (1609 m)</button>
    <button data-val="squadratinhos" class="active">Squadratinhos (201 m)</button>
  </div>
  <div class="seg" id="seg-visao">
    <button data-val="paises" class="active">Países</button>
    <button data-val="distritos">Distritos</button>
    <button data-val="concelhos">Concelhos</button>
  </div>
  <button id="btn-color-mode" style="display:none;">Cores: uniforme</button>
</div>

<div id="sheet" class="collapsed">
  <div id="sheet-handle"><div class="bar"></div></div>
  <div id="sheet-summary"><span id="summary-text"></span><span style="color:#7d8598">▲</span></div>
  <div id="sheet-body">
    <div id="sheet-list"></div>
    <div id="sheet-detail"></div>
  </div>
</div>

<script>
const DATA_URLS = {
  squadrats: 'data/tile_info_squadrats.json',
  squadratinhos: 'data/tile_info_squadratinhos.json',
  stats: 'data/stats.json',
  concelhos: 'data/concelhos_pt.geojson',
  distritos: 'data/distritos_pt.geojson',
  portugal: 'data/portugal_outline.geojson',
  provinciasEs: 'data/provincias_es.geojson',
  spain: 'data/spain_outline.geojson',
};
const ZKEY = { squadrats: 'z14', squadratinhos: 'z17' };

let state = {
  grelha: 'squadratinhos', visao: 'paises', sheetExpanded: false, selected: null,
  sortKey: 'captured', sortDir: 'desc',           // tabela principal (distritos/concelhos)
  sortForeignKey: 'captured', sortForeignDir: 'desc', // tabela de províncias ES
  showZero: false,      // linha "+N sem capturas" expandida?
  colorMode: 'uniform', // 'uniform' | 'region' — cor dos squares capturados
};
let cache = {};
let squaresLayer = L.layerGroup();
let boundaryLayer = L.layerGroup();
let boundaryLayersByName = {}; // nome -> layer Leaflet, reconstruído a cada drawBoundaries()

const map = L.map('map', { zoomControl: true, attributionControl: false }).setView([39.6, -8.5], 7);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  subdomains: 'abcd', maxZoom: 19,
}).addTo(map);
squaresLayer.addTo(map);
boundaryLayer.addTo(map);

// --- slippy-tile math (mesma convenção do pipeline: kml_parse.py) ---
function tileNW(x, y, z) {
  const n = Math.pow(2, z);
  const lon = x / n * 360 - 180;
  const lat = Math.atan(Math.sinh(Math.PI * (1 - 2 * y / n))) * 180 / Math.PI;
  return [lat, lon];
}
function tileBounds(x, y, z) {
  const nw = tileNW(x, y, z);
  const se = tileNW(x + 1, y + 1, z);
  return [[nw[0], nw[1]], [se[0], se[1]]];
}

async function loadAll() {
  const entries = Object.entries(DATA_URLS);
  const results = await Promise.all(entries.map(([, url]) => fetch(url).then(r => r.json())));
  entries.forEach(([key], i) => { cache[key] = results[i]; });
}

function pctColor(pct) {
  // 0% -> cinza-azulado escuro, 100% -> verde vivo
  if (pct === null || pct === undefined) return '#3a4256';
  const t = Math.max(0, Math.min(1, pct / 100));
  const from = [58, 66, 86], to = [57, 217, 122];
  const c = from.map((v, i) => Math.round(v + (to[i] - v) * t));
  return `rgb(${c[0]},${c[1]},${c[2]})`;
}

// paleta categórica distinguível sobre o basemap escuro (~ D3 category20,
// sem tons demasiado escuros/dessaturados)
const CATEGORY_PALETTE = [
  '#e6194b', '#3cb44b', '#ffe119', '#4363d8', '#f58231', '#911eb4', '#46f0f0',
  '#f032e6', '#bcf60c', '#fabebe', '#008080', '#e6beff', '#9a6324', '#fffac8',
  '#aaffc3', '#ffd8b1', '#42d4f4', '#f5c9b0', '#ff69b4', '#a9a9a9',
];
function hashColor(name) {
  let h = 0;
  for (let i = 0; i < name.length; i++) h = (h * 31 + name.charCodeAt(i)) >>> 0;
  return CATEGORY_PALETTE[h % CATEGORY_PALETTE.length];
}

function squareColor(sq) {
  if (state.colorMode === 'region' && sq.in_portugal && (state.visao === 'distritos' || state.visao === 'concelhos')) {
    const key = state.visao === 'concelhos' ? sq.concelho : sq.district;
    if (key) return hashColor(key);
  }
  return sq.in_portugal ? '#3d7bf5' : '#888';
}

function drawSquares() {
  squaresLayer.clearLayers();
  const squares = cache[state.grelha];
  const weight = state.grelha === 'squadratinhos' ? 0.5 : 1;
  squares.forEach(sq => {
    const color = squareColor(sq);
    const rect = L.rectangle(tileBounds(sq.x, sq.y, sq.zoom), {
      color, weight, fillColor: color, fillOpacity: 0.55,
    });
    let where;
    if (sq.in_portugal) where = `${sq.concelho}, ${sq.district}`;
    else if (sq.region) where = `${sq.region}, ${sq.country === 'ES' ? 'Espanha' : sq.country}`;
    else where = 'Estrangeiro (região desconhecida)';
    rect.bindPopup(`<b>${where}</b><br>${sq.lat.toFixed(4)}, ${sq.lon.toFixed(4)}`);
    squaresLayer.addLayer(rect);
  });
}

// contorno grosso + fill leve fixo — não herda a cor do choropleth, para o
// destaque ser sempre inequívoco independentemente da % da região
const SELECTED_STYLE = { color: '#39d97a', weight: 3, opacity: 1, fillColor: '#39d97a', fillOpacity: 0.22 };

function baseStyleFor(name, statsBucket, zkey) {
  const s = (statsBucket[name] || {})[zkey];
  const pct = s ? s.pct : null;
  return {
    color: '#5a6478', weight: 0.7,
    fillColor: pctColor(pct), fillOpacity: pct ? 0.35 : 0.08, opacity: 0.6,
  };
}

function styleFor(name, statsBucket, zkey) {
  const base = baseStyleFor(name, statsBucket, zkey);
  const isSelected = state.selected && state.selected.name === name;
  return isSelected ? { ...base, ...SELECTED_STYLE } : base;
}

function styleForForeign(name, zkey) {
  const captured = ((cache.stats.foreign[zkey] || {}).ES || {})[name] || 0;
  const base = {
    color: '#5a6478', weight: 0.6,
    fillColor: '#c9743d', fillOpacity: captured > 0 ? 0.3 : 0.05, opacity: 0.5,
  };
  const isSelected = state.selected && state.selected.name === name;
  return isSelected ? { ...base, ...SELECTED_STYLE } : base;
}

function addBoundaryFeature(name, layer, styleFn) {
  boundaryLayersByName[name] = { layer, styleFn };
  layer.on('click', (e) => {
    // Leaflet propaga cliques de L.Path para o mapa por defeito
    // (bubblingMouseEvents:true) — sem isto, o handler "clique fora limpa a
    // seleção" do mapa disparava logo a seguir e desfazia a seleção no mesmo click.
    L.DomEvent.stopPropagation(e);
    selectItem(name, { fromMap: true });
  });
}

function drawBoundaries() {
  boundaryLayer.clearLayers();
  boundaryLayersByName = {};
  const zkey = ZKEY[state.grelha];
  const stats = cache.stats;

  if (state.visao === 'paises') {
    const pt = stats.country_pt[zkey];
    const es = stats.country_es[zkey];
    L.geoJSON(cache.portugal, {
      style: { color: '#39d97a', weight: 2, fill: false },
      onEachFeature: (feat, layer) => {
        layer.bindTooltip(`<b>Portugal</b><br>${pt.captured}/${pt.total} · ${fmtPct(pt.pct)}`, { sticky: true });
      },
    }).addTo(boundaryLayer);
    L.geoJSON(cache.spain, {
      style: { color: '#c9743d', weight: 2, fill: false },
      onEachFeature: (feat, layer) => {
        layer.bindTooltip(`<b>Espanha</b><br>${es.captured} sq`, { sticky: true });
      },
    }).addTo(boundaryLayer);
    return;
  }

  const geo = state.visao === 'distritos' ? cache.distritos : cache.concelhos;
  const statsBucket = state.visao === 'distritos' ? stats.by_distrito : stats.by_concelho;
  const nameProp = state.visao === 'distritos' ? 'district' : 'NAME_2';

  L.geoJSON(geo, {
    style: feat => styleFor(feat.properties[nameProp], statsBucket, zkey),
    onEachFeature: (feat, layer) => {
      const name = feat.properties[nameProp];
      const s = (statsBucket[name] || {})[zkey] || { captured: 0, total: 0, pct: 0 };
      layer.bindTooltip(`<b>${name}</b><br>${s.captured}/${s.total} · ${s.pct}%`, { sticky: true });
      addBoundaryFeature(name, layer, () => styleFor(name, statsBucket, zkey));
    },
  }).addTo(boundaryLayer);

  if (state.visao === 'distritos') {
    L.geoJSON(cache.provinciasEs, {
      style: feat => styleForForeign(feat.properties.region, zkey),
      onEachFeature: (feat, layer) => {
        const name = feat.properties.region;
        const captured = ((stats.foreign[zkey] || {}).ES || {})[name] || 0;
        layer.bindTooltip(`<b>${name} (ES)</b><br>${captured} sq`, { sticky: true });
        addBoundaryFeature(name, layer, () => styleForForeign(name, zkey));
      },
    }).addTo(boundaryLayer);
  }
}

function refreshBoundaryStyles() {
  Object.values(boundaryLayersByName).forEach(({ layer, styleFn }) => {
    layer.setStyle(styleFn());
  });
}

const DETAIL_HEIGHT_PX = 250;

function getEntryInfo(name) {
  const zkey = ZKEY[state.grelha];
  const stats = cache.stats;
  if (state.visao === 'distritos') {
    if (stats.by_distrito[name]) {
      return { kind: 'distrito', name, ...stats.by_distrito[name][zkey] };
    }
    const foreignBucket = ((stats.foreign[zkey] || {}).ES) || {};
    if (name in foreignBucket) {
      return { kind: 'foreign', name, captured: foreignBucket[name], total: null, pct: null };
    }
  } else if (state.visao === 'concelhos') {
    if (stats.by_concelho[name]) {
      return { kind: 'concelho', name, ...stats.by_concelho[name][zkey] };
    }
  }
  return null;
}

function rankingFor(info) {
  const zkey = ZKEY[state.grelha];
  const stats = cache.stats;
  if (info.kind === 'foreign') {
    const bucket = ((stats.foreign[zkey] || {}).ES) || {};
    const sorted = Object.keys(bucket).sort((a, b) => bucket[b] - bucket[a]);
    return { rank: sorted.indexOf(info.name) + 1, outOf: sorted.length };
  }
  const bucket = info.kind === 'distrito' ? stats.by_distrito : stats.by_concelho;
  const entries = Object.entries(bucket)
    .map(([n, byZoom]) => [n, byZoom[zkey]])
    .filter(([, s]) => s && (info.kind === 'distrito' || s.captured > 0))
    .sort((a, b) => (b[1].pct || 0) - (a[1].pct || 0));
  return { rank: entries.findIndex(([n]) => n === info.name) + 1, outOf: entries.length };
}

function renderDetailCard(name) {
  const info = getEntryInfo(name);
  const container = document.getElementById('sheet-detail');
  if (!info) { container.innerHTML = ''; return; }

  const rank = rankingFor(info);
  let grid = `<div class="detail-item"><div class="label">Capturados</div><div class="value">${info.captured}</div></div>`;
  if (info.total !== null && info.total !== undefined) {
    grid += `<div class="detail-item"><div class="label">Total</div><div class="value">${info.total}</div></div>`;
    grid += `<div class="detail-item"><div class="label">Por capturar</div><div class="value">${info.total - info.captured}</div></div>`;
    grid += `<div class="detail-item"><div class="label">%</div><div class="value">${fmtPct(info.pct)}</div></div>`;
  }
  grid += `<div class="detail-item"><div class="label">Posição no ranking</div><div class="value">${rank.rank}/${rank.outOf}</div></div>`;

  container.innerHTML = `
    <button class="detail-back" id="detail-back-btn">← voltar à lista</button>
    <h2>${escapeHtml(name)}</h2>
    <div class="detail-grid">${grid}</div>
  `;
  document.getElementById('detail-back-btn').onclick = clearSelection;
}

function selectItem(name, opts) {
  opts = opts || {};
  if (state.selected && state.selected.name === name) {
    clearSelection();
    return;
  }
  state.selected = { name };
  refreshBoundaryStyles();
  if (opts.fromMap) state.sheetExpanded = true;

  sheet.classList.remove('collapsed', 'expanded');
  sheet.classList.add('detail');
  document.querySelector('#sheet-summary span:last-child').textContent = '▼';
  renderDetailCard(name);

  const entry = boundaryLayersByName[name];
  if (entry) {
    // padding compensa o topbar (topo) e o cartão de detalhe (fundo), para a
    // região selecionada ficar centrada no espaço do mapa que fica mesmo visível
    map.fitBounds(entry.layer.getBounds(), {
      paddingTopLeft: [20, 100],
      paddingBottomRight: [20, DETAIL_HEIGHT_PX + 20],
      maxZoom: 12,
    });
  }
}

function clearSelection() {
  state.selected = null;
  refreshBoundaryStyles();
  sheet.classList.remove('detail');
  setSheet(state.sheetExpanded);
  renderStats();
}

function fmtPct(pct) { return pct === null || pct === undefined ? '—' : `${pct}%`; }

function sortRows(rows, key, dir) {
  return [...rows].sort((a, b) => {
    if (key === 'name') {
      return dir === 'asc' ? a.name.localeCompare(b.name) : b.name.localeCompare(a.name);
    }
    const av = a[key] ?? -Infinity, bv = b[key] ?? -Infinity;
    return dir === 'asc' ? av - bv : bv - av;
  });
}

function buildTable(tableId, columns, rows, sortKey, sortDir, interactive = true) {
  const sorted = sortRows(rows, sortKey, sortDir);
  let thead = '<tr>';
  columns.forEach(col => {
    const isSorted = sortKey === col.key;
    const arrow = isSorted ? `<span class="arrow">${sortDir === 'asc' ? '▲' : '▼'}</span>` : '';
    const attrs = interactive ? ` data-table="${tableId}" data-key="${col.key}"` : '';
    thead += `<th class="${col.className || ''}${isSorted ? ' sorted' : ''}"${attrs}>${col.label}${arrow}</th>`;
  });
  thead += '</tr>';

  let tbody = '';
  sorted.forEach(row => {
    const selected = state.selected && state.selected.name === row.name;
    tbody += `<tr class="selectable${selected ? ' selected' : ''}" data-name="${escapeHtml(row.name)}">`;
    columns.forEach(col => {
      tbody += `<td class="${col.className || ''}">${col.render ? col.render(row) : row[col.key]}</td>`;
    });
    tbody += '</tr>';
  });

  return `<table class="stats-table"><thead>${thead}</thead><tbody>${tbody}</tbody></table>`;
}

function renderStats() {
  const zkey = ZKEY[state.grelha];
  const stats = cache.stats;
  const pt = stats.country_pt[zkey];
  const es = stats.country_es[zkey];

  document.getElementById('summary-text').innerHTML =
    `<b>${pt.captured}</b> sq · ${fmtPct(pt.pct)} PT`;

  let html = '';
  if (state.visao === 'paises') {
    html += '<div class="section-title">Por país</div>';
    html += `<div class="stat-row"><span class="stat-name"><span class="legend-dot" style="background:#39d97a"></span>Portugal</span><b>${pt.captured}/${pt.total} · ${fmtPct(pt.pct)}</b></div>`;
    html += `<div class="stat-row"><span class="stat-name"><span class="legend-dot" style="background:#888"></span>Espanha</span><b>${es.captured} sq</b></div>`;
  } else {
    const bucket = state.visao === 'distritos' ? stats.by_distrito : stats.by_concelho;
    const title = state.visao === 'distritos' ? 'Por distrito' : 'Por concelho (com capturas)';
    html += `<div class="section-title">${title}</div>`;
    const allRows = Object.entries(bucket)
      .map(([name, byZoom]) => ({ name, ...byZoom[zkey] }))
      .filter(r => r)
      .map(r => ({ ...r, remaining: r.total - r.captured }));
    const columns = [
      { key: 'name', label: 'Nome', className: 'col-name' },
      { key: 'captured', label: 'Capturados' },
      { key: 'total', label: 'Total', className: 'col-total' },
      { key: 'remaining', label: 'Por capturar', className: 'col-remaining' },
      { key: 'pct', label: '%', render: r => fmtPct(r.pct) },
    ];
    const rows = allRows.filter(r => r.captured > 0);
    const zeroRows = allRows.filter(r => r.captured === 0);
    html += buildTable('main', columns, rows, state.sortKey, state.sortDir);

    if (zeroRows.length) {
      const label = state.visao === 'distritos' ? 'distritos' : 'concelhos';
      if (state.showZero) {
        html += `<div class="zero-toggle" data-zero-toggle="1">− ocultar ${zeroRows.length} ${label} sem capturas</div>`;
        html += buildTable('zero', columns, zeroRows, 'name', 'asc', false);
      } else {
        html += `<div class="zero-toggle" data-zero-toggle="1">+ ${zeroRows.length} ${label} sem capturas</div>`;
      }
    }

    if (state.visao === 'distritos') {
      const foreign = ((stats.foreign[zkey] || {}).ES) || {};
      const foreignRows = Object.entries(foreign).filter(([, c]) => c > 0).map(([name, captured]) => ({ name, captured }));
      if (foreignRows.length) {
        html += '<div class="section-title">Espanha (províncias)</div>';
        html += buildTable('foreign', [
          { key: 'name', label: 'Nome', className: 'col-name' },
          { key: 'captured', label: 'Capturados' },
        ], foreignRows, state.sortForeignKey, state.sortForeignDir);
      }
    }
  }

  html += `<div class="note">Grelha: ${state.grelha === 'squadrats' ? 'squadrats (1609 m)' : 'squadratinhos (201 m)'} · fronteiras de concelho via GADM + OSM (ref:ine) · totais da grelha calculados uma vez (<code>compute_grid_totals.py</code>), nunca recalculados por export</div>`;

  document.getElementById('sheet-list').innerHTML = html;
}

function escapeHtml(s) {
  return s.replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

document.getElementById('sheet-list').addEventListener('click', e => {
  const zeroToggle = e.target.closest('[data-zero-toggle]');
  if (zeroToggle) {
    state.showZero = !state.showZero;
    renderStats();
    return;
  }
  const th = e.target.closest('th[data-key]');
  if (th) {
    const isMain = th.dataset.table === 'main';
    const curKey = isMain ? state.sortKey : state.sortForeignKey;
    const curDir = isMain ? state.sortDir : state.sortForeignDir;
    const key = th.dataset.key;
    const newDir = curKey === key ? (curDir === 'asc' ? 'desc' : 'asc') : (key === 'name' ? 'asc' : 'desc');
    if (isMain) { state.sortKey = key; state.sortDir = newDir; }
    else { state.sortForeignKey = key; state.sortForeignDir = newDir; }
    renderStats();
    return;
  }
  const row = e.target.closest('tr.selectable');
  if (row) selectItem(row.dataset.name, { fromMap: false });
});

function render() {
  drawSquares();
  drawBoundaries();
  renderStats();
}

function updateColorToggleVisibility() {
  const btn = document.getElementById('btn-color-mode');
  const applicable = state.visao === 'distritos' || state.visao === 'concelhos';
  btn.style.display = applicable ? 'inline-block' : 'none';
  btn.classList.toggle('active', state.colorMode === 'region');
  const byLabel = state.visao === 'concelhos' ? 'concelho' : 'distrito';
  btn.textContent = state.colorMode === 'region' ? `Cores: ${byLabel}` : 'Cores: uniforme';
}

document.getElementById('btn-color-mode').onclick = () => {
  state.colorMode = state.colorMode === 'region' ? 'uniform' : 'region';
  updateColorToggleVisibility();
  drawSquares();
};

function resetSelectionUI() {
  if (sheet.classList.contains('detail')) {
    sheet.classList.remove('detail');
    setSheet(state.sheetExpanded);
  }
}

document.querySelectorAll('#seg-grelha button').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('#seg-grelha button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.grelha = btn.dataset.val;
    state.selected = null;
    resetSelectionUI();
    render();
  };
});
document.querySelectorAll('#seg-visao button').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('#seg-visao button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.visao = btn.dataset.val;
    state.selected = null;
    state.showZero = false;
    resetSelectionUI();
    updateColorToggleVisibility();
    render();
  };
});

// bottom sheet: toque para expandir/colapsar + arrastar
const sheet = document.getElementById('sheet');
function setSheet(expanded) {
  state.sheetExpanded = expanded;
  sheet.classList.toggle('expanded', expanded);
  sheet.classList.toggle('collapsed', !expanded);
  document.querySelector('#sheet-summary span:last-child').textContent = expanded ? '▼' : '▲';
}
document.getElementById('sheet-summary').onclick = () => {
  if (state.selected) { clearSelection(); return; }
  setSheet(!state.sheetExpanded);
};

let dragStartY = null;
const handle = document.getElementById('sheet-handle');
handle.addEventListener('pointerdown', e => { dragStartY = e.clientY; });
handle.addEventListener('pointerup', e => {
  if (dragStartY === null) return;
  const dy = e.clientY - dragStartY;
  if (state.selected) {
    if (dy > 15) clearSelection(); // arrastar para baixo no cartão de detalhe volta à lista
  } else if (dy < -15) setSheet(true);
  else if (dy > 15) setSheet(false);
  else setSheet(!state.sheetExpanded);
  dragStartY = null;
});
handle.addEventListener('pointercancel', () => { dragStartY = null; });

// limpar seleção: Escape ou clique no mapa fora de qualquer polígono
// (addBoundaryFeature já para a propagação do click do polígono para o mapa
// via L.DomEvent.stopPropagation — sem isso este handler disparava a seguir
// e desfazia a seleção no mesmo click)
document.addEventListener('keydown', e => { if (e.key === 'Escape' && state.selected) clearSelection(); });
map.on('click', () => { if (state.selected) clearSelection(); });

(async function init() {
  await loadAll();
  updateColorToggleVisibility();
  render();
  document.getElementById('loading').style.display = 'none';
})();
</script>
</body>
</html>
