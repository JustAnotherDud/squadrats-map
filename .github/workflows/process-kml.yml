name: process-kml

# Só repository_dispatch — de propósito, sem trigger de push. O próprio job
# faz commit no fim; se reagisse a push também, o commit do bot disparava-se
# a si próprio (não é loop infinito, o segundo run não tem payload de dispatch
# e sai sem fazer nada, mas é ruído/confusão a evitar).
on:
  repository_dispatch:
    types: [kml-updated]

# Ficheiros duplicados do Drive (ex: "nome (1).kml") ou dois exports próximos
# no tempo disparam dois webhooks quase simultâneos -> dois runs em paralelo,
# ambos tentam git push, o segundo é rejeitado (non-fast-forward) e o job
# falha (visto em produção 21 jul). Com group fixo, runs concorrentes ficam
# em fila em vez de correr ao mesmo tempo — o segundo só arranca depois do
# primeiro terminar (checkout já traz o commit dele), por isso o "git diff
# --quiet" do passo de commit trata-o como no-op se não houver nada de novo.
concurrency:
  group: process-kml-push
  cancel-in-progress: false

jobs:
  process-kml:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Descarregar o KML (fileId do dispatch)
        env:
          GOOGLE_SA_KEY: ${{ secrets.GOOGLE_SA_KEY }}
        run: |
          python3 pipeline/download_kml.py \
            "${{ github.event.client_payload.fileId }}" \
            /tmp/incoming.kml

      - name: Correr o pipeline
        run: python3 pipeline/pipeline.py /tmp/incoming.kml data

      - name: Commitar só se houver diferença real
        run: |
          git config user.name "squadrats-bot"
          git config user.email "actions@users.noreply.github.com"

          if git diff --quiet -- data/tile_info_squadrats.json data/tile_info_squadratinhos.json data/stats.json; then
            echo "sem alterações reais nos squares — nada a commitar."
            exit 0
          fi

          git add data/tile_info_squadrats.json data/tile_info_squadratinhos.json data/stats.json
          git commit -m "chore(data): atualizar squares (${{ github.event.client_payload.fileName }}) [skip ci]"

          # cinto e suspensórios: com o concurrency acima isto quase nunca
          # dispara, mas cobre a janela rara entre runs concorrentes que
          # escapem à fila. Se o rebase falhar por conflito real nos JSON
          # gerados, deixa o job falhar visivelmente em vez de forçar um
          # push que pise dados — mais fácil de investigar do que silenciar.
          git pull --rebase origin master
          git push
